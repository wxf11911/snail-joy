<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>🐌 小蜗游戏屋</title>
<link rel="manifest" href="manifest.json">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 50%, #16213e 100%);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  -webkit-touch-callout: none;
  user-select: none;
  padding: 20px;
}
.container {
  text-align: center;
  max-width: 400px;
  width: 100%;
}
.logo {
  font-size: 80px;
  margin-bottom: 10px;
  animation: bounce 2s infinite;
}
@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-15px); }
}
h1 {
  color: #ffd700;
  font-size: 32px;
  margin-bottom: 8px;
  text-shadow: 0 0 20px rgba(255,215,0,0.3);
}
.subtitle {
  color: #8899cc;
  font-size: 14px;
  margin-bottom: 30px;
}
.game-card {
  background: rgba(26, 26, 46, 0.9);
  border-radius: 20px;
  padding: 30px;
  box-shadow: 0 8px 32px rgba(100, 100, 255, 0.2);
  margin-bottom: 20px;
  cursor: pointer;
  transition: transform 0.3s;
  border: 1px solid rgba(100, 100, 255, 0.1);
}
.game-card:hover {
  transform: scale(1.02);
}
.game-icon {
  font-size: 60px;
  margin-bottom: 10px;
}
.game-card h2 {
  color: #fff;
  font-size: 22px;
  margin-bottom: 8px;
}
.game-card p {
  color: #8899cc;
  font-size: 14px;
  line-height: 1.6;
}
.play-btn {
  display: inline-block;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: #fff;
  border: none;
  border-radius: 30px;
  padding: 14px 40px;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
  margin-top: 15px;
  text-decoration: none;
  transition: box-shadow 0.3s;
}
.play-btn:hover {
  box-shadow: 0 4px 20px rgba(102, 126, 234, 0.5);
}
.hint {
  color: #556677;
  font-size: 12px;
  margin-top: 20px;
  line-height: 1.8;
}
.hint span {
  display: inline-block;
  background: rgba(255,255,255,0.05);
  padding: 4px 10px;
  border-radius: 10px;
  margin: 2px;
}
</style>
</head>
<body>
<div class="container">
  <div class="logo">🐌</div>
  <h1>小蜗游戏屋</h1>
  <p class="subtitle">Snail Game House 🎮</p>
  
  <div class="game-card" onclick="location.href='snail_game.html'">
    <div class="game-icon">🎮</div>
    <h2>小蜗接接乐</h2>
    <p>← → 移动小蜗，接住掉落的宝物！<br>漏掉一个就 game over 💀</p>
    <a class="play-btn" href="snail_game.html">开始游戏 🎮</a>
  </div>
  
  <div class="hint">
    <span>📱 添加到桌面 = 像 App 一样打开</span><br>
    <span>💬 分享链接给朋友，点开即玩</span>
  </div>
</div>
<script>
// Prevent mobile menus
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('selectstart', e => e.preventDefault());
</script>
</body>
</html>
